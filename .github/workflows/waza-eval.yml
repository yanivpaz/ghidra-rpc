name: Waza Evaluation

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  waza:
    name: Run Waza Check and Eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Install Waza
        run: |
          mkdir -p "$HOME/bin"
          export PATH="$HOME/bin:$PATH"
          if ! command -v waza >/dev/null 2>&1; then
            curl -fsSL https://raw.githubusercontent.com/microsoft/waza/main/install.sh | bash
          fi
          export PATH="$HOME/bin:$PATH"
          waza --version

      - name: Run Waza skill check
        continue-on-error: true
        run: |
          export PATH="$HOME/bin:$PATH"
          waza check . --no-update-check || true

      - name: Run Waza eval suite
        run: |
          export PATH="$HOME/bin:$PATH"
          waza run evals/ghidra-rpc/eval.yaml --output results.json --reporter junit:results.xml --no-update-check

      - name: Print Waza test result summary
        run: |
          export PATH="$HOME/bin:$PATH"
          echo "=== Waza results.json ==="
          if [ -f results.json ]; then
            python3 -m json.tool results.json
          else
            echo "results.json not found"
          fi

      - name: Write native GitHub workflow summary
        if: always()
        run: |
          if [ -f results.json ]; then
            python3 - <<'PY' > "$GITHUB_STEP_SUMMARY"
import json
from pathlib import Path

with open('results.json') as f:
    results = json.load(f)

tasks = results.get('tasks', [])
summary = results.get('summary', {})

print('# Waza Eval Summary')
print('')
print('**Status:**', summary.get('status', 'unknown'))
print('')
print('| Metric | Value |')
print('|---|---|')
print(f"| Success rate | {summary.get('success_rate', 'N/A')} |")
print(f"| Aggregate score | {summary.get('aggregate_score', 'N/A')} |")
print(f"| Total tests | {summary.get('total', len(tasks))} |")
print(f"| Passed | {summary.get('passed', 'N/A')} |")
print(f"| Failed | {summary.get('failed', 'N/A')} |")
print('')
if tasks:
    print('## Task Results')
    print('')
    print('| Task | Result | Score | Duration |')
    print('|---|---|---|---|')
    for task in tasks:
        name = task.get('name') or task.get('id', 'unknown')
        result = 'passed' if task.get('pass_rate', 0) >= 1 else 'failed'
        score = task.get('avg', 'N/A')
        duration = task.get('duration_ms', 'N/A')
        print(f"| {name} | {result} | {score} | {duration}ms |")
PY
          else
            echo 'results.json not found' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Waza results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: waza-results-${{ github.run_id }}
          path: |
            results.json
            results.xml
